<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Jeu de Piste</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --forest:#1a2e1a; --moss:#2d4a1e; --leaf:#4a7c2f; --lime:#8bc34a;
    --sand:#f5f0e8; --bark:#5c3d1e; --amber:#d4832a; --danger:#c0392b;
  }
  html,body { height:100%; background:var(--forest); font-family:'Segoe UI',system-ui,sans-serif; color:var(--sand); overflow-x:hidden; }

  /* ── LANGUAGE PICKER ── */
  #lang-screen {
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:2rem; padding:2rem;
  }
  .lang-icon { font-size:3.5rem; filter:drop-shadow(0 4px 12px rgba(139,195,74,.4)); }
  .lang-title { font-size:1.6rem; font-weight:800; color:var(--lime); text-align:center; }
  .lang-sub { font-size:.9rem; color:rgba(245,240,232,.5); text-align:center; }
  .lang-buttons { display:flex; gap:1rem; }
  .btn-lang {
    background:var(--moss); border:2px solid rgba(139,195,74,.3);
    border-radius:14px; padding:1rem 2rem; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:.4rem;
    transition:border-color .2s, background .2s; -webkit-tap-highlight-color:transparent;
  }
  .btn-lang:hover, .btn-lang:active { border-color:var(--lime); background:var(--leaf); }
  .btn-lang .flag { font-size:2rem; }
  .btn-lang .lang-name { font-size:.85rem; font-weight:700; color:var(--sand); }

  /* ── SETUP SCREEN ── */
  #setup-screen { display:none; min-height:100vh; flex-direction:column; align-items:center; justify-content:center; padding:2rem 1.5rem; gap:2rem; }
  .logo { text-align:center; }
  .logo-icon { font-size:4rem; display:block; margin-bottom:.5rem; filter:drop-shadow(0 4px 12px rgba(139,195,74,.4)); }
  .logo h1 { font-size:1.8rem; font-weight:700; letter-spacing:.05em; color:var(--lime); text-transform:uppercase; }
  .logo p { font-size:.9rem; color:rgba(245,240,232,.6); margin-top:.3rem; }
  .setup-card { background:var(--moss); border:1px solid rgba(139,195,74,.2); border-radius:16px; padding:2rem 1.5rem; width:100%; max-width:380px; box-shadow:0 8px 32px rgba(0,0,0,.4); }
  .setup-card label { display:block; font-size:.8rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--lime); margin-bottom:.6rem; }
  .setup-card input {
    width:100%; background:var(--forest); border:1.5px solid rgba(139,195,74,.3);
    border-radius:10px; padding:.9rem 1rem; color:var(--sand); font-size:1.1rem;
    font-weight:600; outline:none; transition:border-color .2s; -webkit-appearance:none;
  }
  .setup-card input:focus { border-color:var(--lime); box-shadow:0 0 0 3px rgba(139,195,74,.15); }
  .setup-card input::placeholder { color:rgba(245,240,232,.3); font-weight:400; }
  .session-info { background:rgba(139,195,74,.08); border:1px solid rgba(139,195,74,.2); border-radius:8px; padding:.7rem 1rem; font-size:.8rem; color:rgba(245,240,232,.5); margin-top:1rem; text-align:center; }
  .session-info span { color:var(--lime); font-weight:600; }
  .btn-start {
    width:100%; background:linear-gradient(135deg,var(--leaf),var(--lime));
    border:none; border-radius:12px; padding:1rem; color:var(--forest);
    font-size:1.1rem; font-weight:800; letter-spacing:.05em; text-transform:uppercase;
    cursor:pointer; margin-top:1.5rem; transition:transform .15s, box-shadow .15s;
    box-shadow:0 4px 16px rgba(139,195,74,.3); -webkit-tap-highlight-color:transparent;
  }
  .btn-start:active { transform:scale(.97); }
  .btn-start:disabled { opacity:.4; cursor:not-allowed; transform:none; }
  .setup-footer { display:flex; align-items:center; justify-content:space-between; gap:1rem; width:100%; max-width:380px; }
  .btn-lang-switch { background:none; border:none; color:rgba(245,240,232,.4); font-size:.8rem; cursor:pointer; text-decoration:underline; padding:.3rem; }
  .btn-lang-switch:hover { color:var(--lime); }
  .link-legal { color:rgba(245,240,232,.3); font-size:.75rem; text-decoration:underline; cursor:pointer; background:none; border:none; }
  .link-legal:hover { color:rgba(245,240,232,.6); }

  /* ── GAME SCREEN ── */
  #game-screen { display:none; flex-direction:column; height:100vh; height:100dvh; }
  .game-header { background:var(--moss); border-bottom:1px solid rgba(139,195,74,.15); padding:.8rem 1rem; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .team-badge { display:flex; align-items:center; gap:.6rem; }
  .team-icon { width:36px; height:36px; background:linear-gradient(135deg,var(--leaf),var(--lime)); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }
  .team-name-display { font-weight:700; font-size:1rem; }
  .team-session-display { font-size:.7rem; color:rgba(245,240,232,.4); }
  .status-pill { display:flex; align-items:center; gap:.4rem; background:rgba(139,195,74,.1); border:1px solid rgba(139,195,74,.2); border-radius:20px; padding:.3rem .8rem; font-size:.75rem; color:var(--lime); font-weight:600; }
  .status-dot { width:7px; height:7px; border-radius:50%; background:var(--lime); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .gps-bar { background:rgba(139,195,74,.06); border-top:1px solid rgba(139,195,74,.1); padding:.4rem 1rem; display:flex; align-items:center; gap:.5rem; font-size:.72rem; color:rgba(245,240,232,.4); flex-shrink:0; }
  .gps-ok { color:var(--lime); } .gps-err { color:var(--danger); }
  .messages-area { flex:1; overflow-y:auto; padding:1rem; display:flex; flex-direction:column; gap:.8rem; -webkit-overflow-scrolling:touch; }
  .msg-bubble { max-width:85%; padding:.7rem 1rem; border-radius:14px; font-size:.95rem; line-height:1.45; word-break:break-word; }
  .msg-bubble.from-master { background:rgba(212,131,42,.15); border:1px solid rgba(212,131,42,.25); border-bottom-left-radius:4px; align-self:flex-start; }
  .msg-bubble.from-master .msg-author { font-size:.7rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--amber); margin-bottom:.3rem; }
  .msg-bubble.from-team { background:rgba(74,124,47,.2); border:1px solid rgba(139,195,74,.2); border-bottom-right-radius:4px; align-self:flex-end; text-align:right; }
  .msg-time { font-size:.65rem; color:rgba(245,240,232,.35); margin-top:.3rem; }
  .empty-chat { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; color:rgba(245,240,232,.2); gap:.8rem; padding:2rem; }
  .empty-chat-icon { font-size:3rem; }
  .empty-chat p { font-size:.9rem; line-height:1.5; }
  .input-area { background:var(--moss); border-top:1px solid rgba(139,195,74,.15); padding:.8rem 1rem; padding-bottom:calc(.8rem + env(safe-area-inset-bottom)); display:flex; gap:.7rem; align-items:flex-end; flex-shrink:0; }
  .msg-input { flex:1; background:var(--forest); border:1.5px solid rgba(139,195,74,.25); border-radius:20px; padding:.7rem 1rem; color:var(--sand); font-size:.95rem; outline:none; resize:none; max-height:120px; overflow-y:auto; line-height:1.4; font-family:inherit; transition:border-color .2s; -webkit-appearance:none; }
  .msg-input:focus { border-color:var(--lime); }
  .msg-input::placeholder { color:rgba(245,240,232,.3); }
  .btn-send { width:44px; height:44px; background:linear-gradient(135deg,var(--leaf),var(--lime)); border:none; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:transform .15s, opacity .15s; -webkit-tap-highlight-color:transparent; box-shadow:0 2px 8px rgba(139,195,74,.3); }
  .btn-send:active { transform:scale(.9); }
  .btn-send:disabled { opacity:.3; }
  .btn-send svg { width:20px; height:20px; fill:var(--forest); }

  /* ── CLOSED SCREEN ── */
  #closed-screen { display:none; min-height:100vh; flex-direction:column; align-items:center; justify-content:center; padding:2rem; text-align:center; gap:1.5rem; }
  .closed-icon { font-size:4rem; }
  .closed-title { font-size:1.5rem; font-weight:700; color:var(--amber); }
  .closed-text { color:rgba(245,240,232,.6); line-height:1.6; }

  /* ── LEGAL SCREEN ── */
  #legal-screen {
    display:none; position:fixed; inset:0; background:var(--forest);
    overflow-y:auto; z-index:999;
    padding:1.5rem;
  }
  .legal-header { display:flex; align-items:center; gap:1rem; margin-bottom:1.5rem; }
  .btn-back { background:var(--moss); border:1px solid rgba(139,195,74,.2); border-radius:8px; color:var(--sand); padding:.5rem .9rem; font-size:.85rem; cursor:pointer; display:flex; align-items:center; gap:.4rem; }
  .btn-back:hover { background:var(--leaf); }
  .legal-title { font-size:1.1rem; font-weight:700; color:var(--lime); }
  .legal-body { max-width:600px; margin:0 auto; }
  .legal-body h2 { font-size:1rem; font-weight:700; color:var(--lime); margin:1.5rem 0 .5rem; }
  .legal-body p, .legal-body li { font-size:.85rem; color:rgba(245,240,232,.7); line-height:1.7; }
  .legal-body ul { padding-left:1.2rem; margin-top:.4rem; }
  .legal-body a { color:var(--lime); }
  .legal-divider { border:none; border-top:1px solid rgba(139,195,74,.12); margin:1rem 0; }

  /* ── TOAST ── */
  .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--bark); color:var(--sand); padding:.6rem 1.2rem; border-radius:20px; font-size:.85rem; opacity:0; transition:opacity .25s, transform .25s; z-index:9999; white-space:nowrap; pointer-events:none; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ═══════ LANGUAGE SCREEN ═══════ -->
<div id="lang-screen">
  <span class="lang-icon">🧭</span>
  <div>
    <div class="lang-title">Jeu de Piste / Treasure Hunt</div>
    <div class="lang-sub">Choisissez votre langue / Choose your language</div>
  </div>
  <div class="lang-buttons">
    <button class="btn-lang" onclick="setLang('fr')">
      <span class="flag">🇫🇷</span>
      <span class="lang-name">Français</span>
    </button>
    <button class="btn-lang" onclick="setLang('en')">
      <span class="flag">🇬🇧</span>
      <span class="lang-name">English</span>
    </button>
  </div>
</div>

<!-- ═══════ SETUP SCREEN ═══════ -->
<div id="setup-screen">
  <div class="logo">
    <span class="logo-icon">🧭</span>
    <h1 id="txt-app-title">Jeu de Piste</h1>
    <p id="txt-app-sub">Entrez le nom de votre équipe pour commencer</p>
  </div>
  <div class="setup-card">
    <label id="txt-team-label" for="team-input">Nom de l'équipe</label>
    <input type="text" id="team-input" maxlength="30" autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="session-info" id="session-info-box">Session : <span id="session-label">—</span></div>
    <button class="btn-start" id="btn-join" disabled></button>
  </div>
  <div class="setup-footer">
    <button class="btn-lang-switch" onclick="showLangScreen()">🌐 <span id="txt-change-lang">Changer de langue</span></button>
    <button class="link-legal" onclick="showLegal()" id="txt-legal-link">Mentions légales</button>
  </div>
</div>

<!-- ═══════ GAME SCREEN ═══════ -->
<div id="game-screen">
  <div class="game-header">
    <div class="team-badge">
      <div class="team-icon">🏃</div>
      <div>
        <div class="team-name-display" id="header-team-name">Équipe</div>
        <div class="team-session-display" id="header-session">Session —</div>
      </div>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      <span id="txt-status-playing">En jeu</span>
    </div>
  </div>
  <div class="gps-bar">
    <span>📍</span>
    <span id="gps-status"></span>
  </div>
  <div class="messages-area" id="messages-area">
    <div class="empty-chat" id="empty-chat">
      <div class="empty-chat-icon">💬</div>
      <p id="txt-empty-chat"></p>
    </div>
  </div>
  <div class="input-area">
    <textarea class="msg-input" id="msg-input" rows="1" maxlength="500"></textarea>
    <button class="btn-send" id="btn-send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<!-- ═══════ CLOSED SCREEN ═══════ -->
<div id="closed-screen">
  <div class="closed-icon">🏁</div>
  <div class="closed-title" id="txt-closed-title"></div>
  <div class="closed-text" id="txt-closed-text"></div>
</div>

<!-- ═══════ LEGAL SCREEN ═══════ -->
<div id="legal-screen">
  <div class="legal-header">
    <button class="btn-back" id="legal-back-btn" onclick="hideLegal()">← <span id="txt-back">Retour</span></button>
    <div class="legal-title" id="legal-title-text">Mentions légales</div>
  </div>
  <div class="legal-body" id="legal-body"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
// CONFIG Firebase
// ══════════════════════════════════════════
const FIREBASE_URL = 'https://yggdraskills-tt1906-default-rtdb.europe-west1.firebasedatabase.app/'; // ← MODIFIEZ ICI

// ── TRADUCTIONS ──
const I18N = {
  fr: {
    appTitle:       'Jeu de Piste',
    appSub:         'Entrez le nom de votre équipe pour commencer',
    teamLabel:      "Nom de l'équipe",
    teamPlaceholder:'Ex : Les Explorateurs',
    sessionInfo:    'Session : ',
    joinBtn:        'Rejoindre la partie →',
    changeLang:     'Changer de langue',
    legalLink:      'Mentions légales',
    statusPlaying:  'En jeu',
    gpsAcquiring:   'Acquisition GPS...',
    gpsSent:        pos => `Position envoyée (±${pos}m)`,
    gpsError:       e   => `GPS : ${e}`,
    gpsUnavailable: 'GPS non disponible sur cet appareil',
    emptyChat:      'Pas encore de messages.\nÉcrivez au maître du jeu !',
    msgPlaceholder: 'Message au maître du jeu…',
    masterLabel:    '🧭 Maître du jeu',
    closedTitle:    'La partie est terminée !',
    closedText:     'Merci d\'avoir participé.\nLe maître du jeu a clôturé la session.',
    sendError:      'Erreur d\'envoi, vérifiez votre connexion',
    back:           'Retour',
    legalTitle:     'Mentions légales',
    legal:          legalFR,
  },
  en: {
    appTitle:       'Treasure Hunt',
    appSub:         'Enter your team name to start',
    teamLabel:      'Team name',
    teamPlaceholder:'e.g. The Explorers',
    sessionInfo:    'Session: ',
    joinBtn:        'Join the game →',
    changeLang:     'Change language',
    legalLink:      'Legal notice',
    statusPlaying:  'Playing',
    gpsAcquiring:   'Acquiring GPS...',
    gpsSent:        pos => `Location sent (±${pos}m)`,
    gpsError:       e   => `GPS: ${e}`,
    gpsUnavailable: 'GPS not available on this device',
    emptyChat:      'No messages yet.\nWrite to the game master!',
    msgPlaceholder: 'Message to the game master…',
    masterLabel:    '🧭 Game Master',
    closedTitle:    'Game over!',
    closedText:     'Thank you for playing.\nThe game master has ended the session.',
    sendError:      'Send error, check your connection',
    back:           'Back',
    legalTitle:     'Legal notice',
    legal:          legalEN,
  }
};

function legalFR() {
  return `
    <h2>1. Éditeur de l'application</h2>
    <p>Cette application web est mise à disposition dans le cadre d'une activité de jeu de piste.
    Elle est exploitée par l'organisateur de l'événement. Pour toute question, contactez l'organisateur directement.</p>
    <hr class="legal-divider">
    <h2>2. Données personnelles collectées</h2>
    <p>Dans le cadre du jeu de piste, l'application collecte les données suivantes :</p>
    <ul>
      <li><strong>Nom d'équipe</strong> : saisi librement par le joueur lors de l'inscription.</li>
      <li><strong>Position géographique (GPS)</strong> : transmise en temps réel pendant la durée du jeu, uniquement visible par le maître du jeu.</li>
      <li><strong>Messages de tchat</strong> : échangés entre l'équipe et le maître du jeu.</li>
    </ul>
    <hr class="legal-divider">
    <h2>3. Finalité du traitement</h2>
    <p>Les données sont utilisées exclusivement pour :</p>
    <ul>
      <li>Permettre au maître du jeu de suivre la progression des équipes sur une carte.</li>
      <li>Assurer la communication entre les équipes et le maître du jeu.</li>
    </ul>
    <hr class="legal-divider">
    <h2>4. Durée de conservation</h2>
    <p>Toutes les données (position, messages, nom d'équipe) sont <strong>supprimées automatiquement</strong> à la clôture de la session par le maître du jeu. Aucune donnée n'est conservée au-delà de la partie.</p>
    <hr class="legal-divider">
    <h2>5. Hébergement des données</h2>
    <p>Les données sont stockées temporairement sur <strong>Firebase Realtime Database</strong> (Google LLC), dans des centres de données soumis à la réglementation RGPD.
    Politique de confidentialité Google : <a href="https://policies.google.com/privacy" target="_blank">policies.google.com/privacy</a>.</p>
    <hr class="legal-divider">
    <h2>6. Vos droits</h2>
    <p>Conformément au RGPD, vous disposez d'un droit d'accès, de rectification et de suppression de vos données. Contactez l'organisateur de l'événement pour exercer ces droits. En pratique, la fermeture de la session entraîne la suppression immédiate de toutes vos données.</p>
    <hr class="legal-divider">
    <h2>7. Consentement</h2>
    <p>En rejoignant la session de jeu, vous consentez à la collecte de votre position GPS et de vos messages pour la durée du jeu.</p>
  `;
}

function legalEN() {
  return `
    <h2>1. Application publisher</h2>
    <p>This web application is provided as part of a treasure hunt activity. It is operated by the event organiser. For any questions, please contact the organiser directly.</p>
    <hr class="legal-divider">
    <h2>2. Personal data collected</h2>
    <p>As part of the treasure hunt, the application collects the following data:</p>
    <ul>
      <li><strong>Team name</strong>: entered freely by the player at registration.</li>
      <li><strong>Geographic location (GPS)</strong>: transmitted in real time during the game, visible only to the game master.</li>
      <li><strong>Chat messages</strong>: exchanged between the team and the game master.</li>
    </ul>
    <hr class="legal-divider">
    <h2>3. Purpose of processing</h2>
    <p>Data is used exclusively to:</p>
    <ul>
      <li>Allow the game master to track teams' progress on a map.</li>
      <li>Enable communication between teams and the game master.</li>
    </ul>
    <hr class="legal-divider">
    <h2>4. Data retention</h2>
    <p>All data (location, messages, team name) is <strong>automatically deleted</strong> when the game master closes the session. No data is retained beyond the game.</p>
    <hr class="legal-divider">
    <h2>5. Data hosting</h2>
    <p>Data is temporarily stored on <strong>Firebase Realtime Database</strong> (Google LLC), in data centres subject to GDPR regulations.
    Google Privacy Policy: <a href="https://policies.google.com/privacy" target="_blank">policies.google.com/privacy</a>.</p>
    <hr class="legal-divider">
    <h2>6. Your rights</h2>
    <p>Under the GDPR, you have the right to access, rectify and delete your data. Contact the event organiser to exercise these rights. In practice, closing the session results in the immediate deletion of all your data.</p>
    <hr class="legal-divider">
    <h2>7. Consent</h2>
    <p>By joining the game session, you consent to the collection of your GPS location and messages for the duration of the game.</p>
  `;
}

// ── STATE ──
const params = new URLSearchParams(window.location.search);
const SESSION_ID = params.get('s') || 'demo';
let lang = localStorage.getItem('jdp_lang') || null;
let teamName = '';
let geoWatchId = null;
let lastMessages = {};
let T = null; // traductions courantes

// ── ELEMENTS ──
const langScreen   = document.getElementById('lang-screen');
const setupScreen  = document.getElementById('setup-screen');
const gameScreen   = document.getElementById('game-screen');
const closedScreen = document.getElementById('closed-screen');
const legalScreen  = document.getElementById('legal-screen');
const teamInput    = document.getElementById('team-input');
const btnJoin      = document.getElementById('btn-join');
const btnSend      = document.getElementById('btn-send');
const msgInput     = document.getElementById('msg-input');
const messagesArea = document.getElementById('messages-area');
const emptyChat    = document.getElementById('empty-chat');
const gpsStatus    = document.getElementById('gps-status');

// ── LANG ──
function setLang(l) {
  lang = l;
  localStorage.setItem('jdp_lang', l);
  T = I18N[l];
  applyTranslations();
  showSetup();
}

function showLangScreen() {
  langScreen.style.display='flex';
  setupScreen.style.display='none';
}

function applyTranslations() {
  document.documentElement.lang = lang;
  document.title = T.appTitle;
  document.getElementById('txt-app-title').textContent  = T.appTitle;
  document.getElementById('txt-app-sub').textContent    = T.appSub;
  document.getElementById('txt-team-label').textContent = T.teamLabel;
  teamInput.placeholder = T.teamPlaceholder;
  document.getElementById('btn-join').textContent       = T.joinBtn;
  document.getElementById('txt-change-lang').textContent= T.changeLang;
  document.getElementById('txt-legal-link').textContent = T.legalLink;
  document.getElementById('session-label').textContent  = SESSION_ID;
  document.getElementById('txt-status-playing').textContent = T.statusPlaying;
  document.getElementById('txt-empty-chat').textContent = T.emptyChat.replace('\n','\n');
  msgInput.placeholder = T.msgPlaceholder;
  document.getElementById('txt-closed-title').textContent = T.closedTitle;
  document.getElementById('txt-closed-text').textContent  = T.closedText.replace('\n','\n');
  document.getElementById('txt-back').textContent         = T.back;
  document.getElementById('legal-title-text').textContent = T.legalTitle;
  gpsStatus.textContent = T.gpsAcquiring;
  // empty chat avec saut de ligne
  const ec = document.getElementById('txt-empty-chat');
  ec.innerHTML = T.emptyChat.replace('\n','<br>');
}

function showSetup() {
  langScreen.style.display='none';
  setupScreen.style.display='flex';
}

// Démarrage : si lang déjà choisie, aller direct au setup
if (lang) {
  T = I18N[lang];
  applyTranslations();
  showSetup();
}

// ── SETUP ──
teamInput.addEventListener('input', () => { btnJoin.disabled = teamInput.value.trim().length < 2; });
teamInput.addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); if (!btnJoin.disabled) joinGame(); } });
btnJoin.addEventListener('click', joinGame);

async function joinGame() {
  const name = teamInput.value.trim();
  if (!name) return;
  try {
    const open = await fbGet(`sessions/${SESSION_ID}/open`);
    if (open === false) { showClosed(); return; }
  } catch(e) {}
  teamName = name;
  document.getElementById('header-team-name').textContent = name;
  document.getElementById('header-session').textContent = `Session ${SESSION_ID}`;
  await fbSet(`sessions/${SESSION_ID}/teams/${encodeTeam(teamName)}/name`, teamName);
  await fbSet(`sessions/${SESSION_ID}/teams/${encodeTeam(teamName)}/joined`, Date.now());
  setupScreen.style.display='none';
  gameScreen.style.display='flex';
  gpsStatus.textContent = T.gpsAcquiring;
  startGPS();
  startPolling();
}

// ── GPS ──
function startGPS() {
  if (!navigator.geolocation) { gpsStatus.textContent=T.gpsUnavailable; gpsStatus.className='gps-err'; return; }
  geoWatchId = navigator.geolocation.watchPosition(
    pos => {
      const { latitude:lat, longitude:lng, accuracy:acc } = pos.coords;
      gpsStatus.textContent = T.gpsSent(Math.round(acc));
      gpsStatus.className = 'gps-ok';
      fbSet(`sessions/${SESSION_ID}/teams/${encodeTeam(teamName)}/position`, { lat, lng, acc:Math.round(acc), t:Date.now() });
    },
    err => { gpsStatus.textContent=T.gpsError(err.message); gpsStatus.className='gps-err'; },
    { enableHighAccuracy:true, maximumAge:5000, timeout:10000 }
  );
}

// ── POLLING ──
function startPolling() {
  pollMessages();
  setInterval(pollMessages, 3000);
  setInterval(checkSessionOpen, 10000);
}

async function pollMessages() {
  try {
    const data = await fbGet(`sessions/${SESSION_ID}/messages`);
    if (!data) return;
    const myKey = encodeTeam(teamName);
    const msgs = Object.entries(data)
      .map(([id,m])=>({id,...m}))
      .sort((a,b)=>a.t-b.t)
      .filter(m => m.from==='master' ? (m.to===myKey||!m.to) : m.team===myKey);
    if (!msgs.length) return;
    if (lastMessages[msgs[msgs.length-1].id]) return;
    renderMessages(msgs);
  } catch(e) {}
}

async function checkSessionOpen() {
  try { const o=await fbGet(`sessions/${SESSION_ID}/open`); if(o===false) showClosed(); } catch(e){}
}

function renderMessages(msgs) {
  emptyChat.style.display='none';
  const existing = new Set([...messagesArea.querySelectorAll('[data-id]')].map(el=>el.dataset.id));
  msgs.forEach(m => {
    if (existing.has(m.id)) return;
    lastMessages[m.id]=true;
    const isMaster = m.from==='master';
    const bubble=document.createElement('div');
    bubble.className=`msg-bubble ${isMaster?'from-master':'from-team'}`;
    bubble.dataset.id=m.id;
    bubble.innerHTML = isMaster
      ? `<div class="msg-author">${T.masterLabel}</div>${escHtml(m.text)}<div class="msg-time">${fmtTime(m.t)}</div>`
      : `${escHtml(m.text)}<div class="msg-time">${fmtTime(m.t)}</div>`;
    messagesArea.appendChild(bubble);
  });
  messagesArea.scrollTop=messagesArea.scrollHeight;
}

// ── SEND ──
btnSend.addEventListener('click', sendMessage);
msgInput.addEventListener('keydown', e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} });
msgInput.addEventListener('input', ()=>{ msgInput.style.height='auto'; msgInput.style.height=Math.min(msgInput.scrollHeight,120)+'px'; });

async function sendMessage() {
  const text=msgInput.value.trim();
  if(!text||!teamName) return;
  btnSend.disabled=true; msgInput.value=''; msgInput.style.height='auto';
  try {
    await fbPush(`sessions/${SESSION_ID}/messages`, { from:'team', team:encodeTeam(teamName), teamName, text, t:Date.now() });
    await pollMessages();
  } catch(e) { showToast(T.sendError); }
  finally { btnSend.disabled=false; }
}

// ── CLOSED ──
function showClosed() {
  if(geoWatchId) navigator.geolocation.clearWatch(geoWatchId);
  gameScreen.style.display='none';
  closedScreen.style.display='flex';
}

// ── LEGAL ──
function showLegal() {
  document.getElementById('legal-body').innerHTML = T.legal();
  legalScreen.style.display='block';
}
function hideLegal() { legalScreen.style.display='none'; }

// ── FIREBASE ──
const FB = p=>`${FIREBASE_URL}/${p}.json`;
async function fbGet(p){const r=await fetch(FB(p));if(!r.ok)throw new Error(r.status);return r.json();}
async function fbSet(p,v){await fetch(FB(p),{method:'PUT',body:JSON.stringify(v)});}
async function fbPush(p,v){await fetch(FB(p),{method:'POST',body:JSON.stringify(v)});}

// ── UTILS ──
function encodeTeam(n){return n.toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/_+/g,'_').slice(0,30);}
function escHtml(t){if(!t)return'';return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function fmtTime(ts){return new Date(ts).toLocaleTimeString(lang==='en'?'en-GB':'fr-FR',{hour:'2-digit',minute:'2-digit'});}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
</script>
</body>
</html>
