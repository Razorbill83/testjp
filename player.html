<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Jeu de Piste</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --forest:#1a2e1a; --moss:#2d4a1e; --leaf:#4a7c2f; --lime:#8bc34a;
  --sand:#f5f0e8; --bark:#5c3d1e; --amber:#d4832a; --danger:#c0392b;
  --bubble-out-bg:#2a5a18; --bubble-out-bdr:rgba(139,195,74,.4); --bubble-out-text:#dff0c0;
  --bubble-in-bg:#3d2a08;  --bubble-in-bdr:rgba(212,131,42,.4);  --bubble-in-text:#f5e8cc;
}
html,body { height:100%; background:var(--forest); font-family:'Segoe UI',system-ui,sans-serif; color:var(--sand); overflow-x:hidden; }

/* ════ FAB MENU ════ */
#fab-menu { position:fixed; top:12px; right:12px; z-index:8000; }
.fab-btn {
  width:40px; height:40px; border-radius:50%;
  background:var(--moss); border:1px solid rgba(139,195,74,.3);
  color:var(--lime); font-size:1.3rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 10px rgba(0,0,0,.4); transition:background .15s;
  -webkit-tap-highlight-color:transparent;
}
.fab-btn:hover { background:var(--leaf); }
.fab-dropdown {
  position:absolute; top:48px; right:0;
  background:var(--moss); border:1px solid rgba(139,195,74,.2);
  border-radius:12px; min-width:200px;
  box-shadow:0 8px 24px rgba(0,0,0,.5);
  overflow:hidden; display:none; flex-direction:column;
}
.fab-dropdown.open { display:flex; }
.fab-section-label { font-size:.65rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:rgba(245,240,232,.3); padding:.6rem 1rem .3rem; }
.fab-item {
  display:flex; align-items:center; gap:.7rem;
  padding:.75rem 1rem; cursor:pointer; font-size:.88rem; color:var(--sand);
  border:none; background:none; text-align:left; width:100%;
  transition:background .15s; -webkit-tap-highlight-color:transparent;
}
.fab-item:hover { background:rgba(139,195,74,.12); }
.fab-icon { font-size:1rem; width:20px; text-align:center; }
.fab-item.active { color:var(--lime); font-weight:600; }
.fab-divider { border:none; border-top:1px solid rgba(139,195,74,.1); margin:.2rem 0; }

/* ════ LANG SCREEN ════ */
#lang-screen { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2rem; padding:2rem; }
.lang-icon  { font-size:3.5rem; filter:drop-shadow(0 4px 12px rgba(139,195,74,.4)); }
.lang-title { font-size:1.6rem; font-weight:800; color:var(--lime); text-align:center; }
.lang-sub   { font-size:.9rem; color:rgba(245,240,232,.5); text-align:center; }
.lang-buttons { display:flex; gap:1rem; }
.btn-lang {
  background:var(--moss); border:2px solid rgba(139,195,74,.3);
  border-radius:14px; padding:1rem 2rem; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:.4rem;
  transition:border-color .2s, background .2s; -webkit-tap-highlight-color:transparent;
}
.btn-lang:hover,.btn-lang:active { border-color:var(--lime); background:var(--leaf); }
.btn-lang .flag      { font-size:2rem; }
.btn-lang .lang-name { font-size:.85rem; font-weight:700; }

/* ════ SETUP SCREEN ════ */
#setup-screen { display:none; min-height:100vh; flex-direction:column; align-items:center; justify-content:center; padding:2rem 1.5rem; gap:2rem; }
.logo { text-align:center; }
.logo-icon { font-size:4rem; display:block; margin-bottom:.5rem; filter:drop-shadow(0 4px 12px rgba(139,195,74,.4)); }
.logo h1   { font-size:1.8rem; font-weight:700; letter-spacing:.05em; color:var(--lime); text-transform:uppercase; }
.logo p    { font-size:.9rem; color:rgba(245,240,232,.6); margin-top:.3rem; }
.setup-card {
  background:var(--moss); border:1px solid rgba(139,195,74,.2);
  border-radius:16px; padding:2rem 1.5rem; width:100%; max-width:380px;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.field-label { display:block; font-size:.8rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--lime); margin-bottom:.6rem; }
.text-input {
  width:100%; background:var(--forest); border:1.5px solid rgba(139,195,74,.3);
  border-radius:10px; padding:.9rem 1rem; color:var(--sand); font-size:1.1rem;
  font-weight:600; outline:none; transition:border-color .2s; -webkit-appearance:none;
}
.text-input:focus { border-color:var(--lime); box-shadow:0 0 0 3px rgba(139,195,74,.15); }
.text-input::placeholder { color:rgba(245,240,232,.3); font-weight:400; }
.session-info { background:rgba(139,195,74,.08); border:1px solid rgba(139,195,74,.2); border-radius:8px; padding:.7rem 1rem; font-size:.8rem; color:rgba(245,240,232,.5); margin-top:1rem; text-align:center; }
.session-info span { color:var(--lime); font-weight:600; }
.btn-primary {
  width:100%; background:linear-gradient(135deg,var(--leaf),var(--lime));
  border:none; border-radius:12px; padding:1rem; color:var(--forest);
  font-size:1.05rem; font-weight:800; letter-spacing:.05em; text-transform:uppercase;
  cursor:pointer; margin-top:1.2rem; transition:transform .15s, box-shadow .15s;
  box-shadow:0 4px 16px rgba(139,195,74,.3); -webkit-tap-highlight-color:transparent;
}
.btn-primary:active { transform:scale(.97); }
.btn-primary:disabled { opacity:.4; cursor:not-allowed; transform:none; }

/* ── BANNER "session en cours" ── */
#resume-banner {
  display:none;
  background:rgba(139,195,74,.08); border:1px solid rgba(139,195,74,.25);
  border-radius:12px; padding:1rem 1.2rem; width:100%; max-width:380px;
  position:relative;
}
.resume-title { font-size:.75rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--lime); margin-bottom:.5rem; }
.resume-info  { font-size:.88rem; color:rgba(245,240,232,.75); line-height:1.6; }
.resume-info strong { color:var(--sand); }
.btn-resume {
  width:100%; margin-top:.9rem; padding:.8rem;
  background:linear-gradient(135deg,var(--leaf),var(--lime));
  border:none; border-radius:10px; color:var(--forest);
  font-size:.95rem; font-weight:800; cursor:pointer; letter-spacing:.04em;
  -webkit-tap-highlight-color:transparent;
}
.btn-resume:active { opacity:.85; }
.btn-other {
  width:100%; margin-top:.5rem; padding:.65rem;
  background:none; border:1px solid rgba(245,240,232,.15);
  border-radius:10px; color:rgba(245,240,232,.5);
  font-size:.82rem; cursor:pointer; transition:border-color .15s, color .15s;
  -webkit-tap-highlight-color:transparent;
}
.btn-other:hover { border-color:rgba(245,240,232,.35); color:rgba(245,240,232,.8); }

/* ════ GAME SCREEN ════ */
#game-screen { display:none; flex-direction:column; height:100vh; height:100dvh; }
.game-header {
  background:var(--moss); border-bottom:1px solid rgba(139,195,74,.15);
  padding:.75rem 1rem; padding-right:60px;
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.team-badge { display:flex; align-items:center; gap:.6rem; }
.team-icon  { width:36px; height:36px; background:linear-gradient(135deg,var(--leaf),var(--lime)); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }
.team-name-display    { font-weight:700; font-size:1rem; }
.team-session-display { font-size:.7rem; color:rgba(245,240,232,.4); }
.status-pill { display:flex; align-items:center; gap:.4rem; background:rgba(139,195,74,.1); border:1px solid rgba(139,195,74,.2); border-radius:20px; padding:.3rem .8rem; font-size:.75rem; color:var(--lime); font-weight:600; }
.status-dot  { width:7px; height:7px; border-radius:50%; background:var(--lime); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.gps-bar { background:rgba(139,195,74,.06); border-top:1px solid rgba(139,195,74,.1); padding:.35rem 1rem; display:flex; align-items:center; gap:.5rem; font-size:.72rem; color:rgba(245,240,232,.4); flex-shrink:0; }
.gps-ok  { color:var(--lime); }
.gps-err { color:var(--danger); }

/* ── MESSAGES ── */
.messages-area { flex:1; overflow-y:auto; padding:1rem 1rem .5rem; display:flex; flex-direction:column; gap:.7rem; -webkit-overflow-scrolling:touch; }
.msg-wrap-out { display:flex; justify-content:flex-end; }
.msg-wrap-in  { display:flex; justify-content:flex-start; }
.msg-bubble   { max-width:80%; padding:.65rem .9rem; border-radius:16px; font-size:.95rem; line-height:1.45; word-break:break-word; }
.msg-bubble.sent     { background:var(--bubble-out-bg); border:1px solid var(--bubble-out-bdr); color:var(--bubble-out-text); border-bottom-right-radius:4px; }
.msg-bubble.received { background:var(--bubble-in-bg);  border:1px solid var(--bubble-in-bdr);  color:var(--bubble-in-text);  border-bottom-left-radius:4px; }
.msg-author { font-size:.68rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--amber); margin-bottom:.3rem; }
.msg-time   { font-size:.62rem; display:block; margin-top:.3rem; }
.msg-bubble.sent     .msg-time { color:rgba(200,240,160,.4); text-align:right; }
.msg-bubble.received .msg-time { color:rgba(245,220,170,.35); }
.empty-chat { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; color:rgba(245,240,232,.2); gap:.8rem; padding:2rem; }
.empty-chat-icon { font-size:3rem; }
.empty-chat p { font-size:.9rem; line-height:1.6; }

/* ── INPUT ── */
.input-area { background:var(--moss); border-top:1px solid rgba(139,195,74,.15); padding:.8rem 1rem; padding-bottom:calc(.8rem + env(safe-area-inset-bottom)); display:flex; gap:.7rem; align-items:flex-end; flex-shrink:0; }
.msg-input  { flex:1; background:var(--forest); border:1.5px solid rgba(139,195,74,.25); border-radius:20px; padding:.7rem 1rem; color:var(--sand); font-size:.95rem; outline:none; resize:none; max-height:120px; overflow-y:auto; line-height:1.4; font-family:inherit; transition:border-color .2s; -webkit-appearance:none; }
.msg-input:focus { border-color:var(--lime); }
.msg-input::placeholder { color:rgba(245,240,232,.3); }
.btn-send { width:44px; height:44px; background:linear-gradient(135deg,var(--leaf),var(--lime)); border:none; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:transform .15s, opacity .15s; -webkit-tap-highlight-color:transparent; box-shadow:0 2px 8px rgba(139,195,74,.3); }
.btn-send:active { transform:scale(.9); }
.btn-send:disabled { opacity:.3; }
.btn-send svg { width:20px; height:20px; fill:var(--forest); }

/* ════ CLOSED SCREEN ════ */
#closed-screen { display:none; min-height:100vh; flex-direction:column; align-items:center; justify-content:center; padding:2rem; text-align:center; gap:1.5rem; }
.closed-icon  { font-size:4rem; }
.closed-title { font-size:1.5rem; font-weight:700; color:var(--amber); }
.closed-text  { color:rgba(245,240,232,.6); line-height:1.6; }

/* ════ TOAST ════ */
.toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--bark); color:var(--sand); padding:.6rem 1.2rem; border-radius:20px; font-size:.85rem; opacity:0; transition:opacity .25s, transform .25s; z-index:9999; white-space:nowrap; pointer-events:none; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ════ FAB MENU ════ -->
<div id="fab-menu">
  <button class="fab-btn" onclick="toggleFab()" aria-label="Menu">⋮</button>
  <div class="fab-dropdown" id="fab-dropdown">
    <div class="fab-section-label">Langue / Language</div>
    <button class="fab-item" id="fab-fr" onclick="setLangFromMenu('fr')"><span class="fab-icon">🇫🇷</span> Français</button>
    <button class="fab-item" id="fab-en" onclick="setLangFromMenu('en')"><span class="fab-icon">🇬🇧</span> English</button>
    <hr class="fab-divider">
    <button class="fab-item" id="fab-legal-btn" onclick="goLegal()"><span class="fab-icon">📄</span><span id="fab-legal-label">Mentions légales</span></button>
  </div>
</div>

<!-- ════ LANG SCREEN ════ -->
<div id="lang-screen">
  <span class="lang-icon">🧭</span>
  <div>
    <div class="lang-title">Jeu de Piste / Treasure Hunt</div>
    <div class="lang-sub">Choisissez votre langue / Choose your language</div>
  </div>
  <div class="lang-buttons">
    <button class="btn-lang" onclick="setLang('fr')"><span class="flag">🇫🇷</span><span class="lang-name">Français</span></button>
    <button class="btn-lang" onclick="setLang('en')"><span class="flag">🇬🇧</span><span class="lang-name">English</span></button>
  </div>
</div>

<!-- ════ SETUP SCREEN ════ -->
<div id="setup-screen">
  <div class="logo">
    <span class="logo-icon">🧭</span>
    <h1 id="txt-app-title">Jeu de Piste</h1>
    <p  id="txt-app-sub"></p>
  </div>

  <!-- Bannière "reprendre la session" -->
  <div id="resume-banner">
    <div class="resume-title" id="txt-resume-title">Session en cours</div>
    <div class="resume-info" id="resume-info"></div>
    <button class="btn-resume" id="btn-resume" onclick="resumeSession()"></button>
    <button class="btn-other"  id="btn-other"  onclick="clearAndSetup()"></button>
  </div>

  <!-- Formulaire normal -->
  <div class="setup-card" id="setup-form">
    <label class="field-label" id="txt-team-label" for="team-input">Nom de l'équipe</label>
    <input class="text-input" type="text" id="team-input" maxlength="30" autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="session-info">Session : <span id="session-label">—</span></div>
    <button class="btn-primary" id="btn-join" disabled></button>
  </div>
</div>

<!-- ════ GAME SCREEN ════ -->
<div id="game-screen">
  <div class="game-header">
    <div class="team-badge">
      <div class="team-icon">🏃</div>
      <div>
        <div class="team-name-display"    id="header-team-name"></div>
        <div class="team-session-display" id="header-session"></div>
      </div>
    </div>
    <div class="status-pill"><div class="status-dot"></div><span id="txt-status-playing">En jeu</span></div>
  </div>
  <div class="gps-bar"><span>📍</span><span id="gps-status"></span></div>
  <div class="messages-area" id="messages-area">
    <div class="empty-chat" id="empty-chat">
      <div class="empty-chat-icon">💬</div>
      <p id="txt-empty-chat"></p>
    </div>
  </div>
  <div class="input-area">
    <textarea class="msg-input" id="msg-input" rows="1" maxlength="500"></textarea>
    <button class="btn-send" id="btn-send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<!-- ════ CLOSED SCREEN ════ -->
<div id="closed-screen">
  <div class="closed-icon">🏁</div>
  <div class="closed-title" id="txt-closed-title"></div>
  <div class="closed-text"  id="txt-closed-text"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════
const FIREBASE_URL = 'https://yggdraskills-tt1906-default-rtdb.europe-west1.firebasedatabase.app';

// ════════════════════════════════════════
// TRADUCTIONS
// ════════════════════════════════════════
const I18N = {
  fr: {
    appTitle:        'Jeu de Piste',
    appSub:          'Entrez le nom de votre équipe pour commencer',
    teamLabel:       "Nom de l'équipe",
    teamPlaceholder: 'Ex : Les Explorateurs',
    joinBtn:         'Rejoindre la partie →',
    statusPlaying:   'En jeu',
    gpsAcquiring:    'Acquisition GPS…',
    gpsSent:         n => `Position envoyée (±${n}m)`,
    gpsError:        e => `GPS : ${e}`,
    gpsUnavail:      'GPS non disponible',
    emptyChat:       'Pas encore de messages.\nÉcrivez au maître du jeu !',
    msgPlaceholder:  'Message au maître du jeu…',
    masterLabel:     '🧭 Maître du jeu',
    closedTitle:     'La partie est terminée !',
    closedText:      'Merci d\'avoir participé.\nLe maître du jeu a clôturé la session.',
    sendError:       'Erreur d\'envoi — vérifiez votre connexion',
    legalLabel:      'Mentions légales',
    resumeTitle:     'Session en cours',
    resumeInfo:      (team, sid) => `Équipe <strong>${team}</strong> — Session <strong>${sid}</strong>`,
    resumeBtn:       'Reprendre la partie →',
    otherBtn:        'Rejoindre une autre partie',
  },
  en: {
    appTitle:        'Treasure Hunt',
    appSub:          'Enter your team name to start',
    teamLabel:       'Team name',
    teamPlaceholder: 'e.g. The Explorers',
    joinBtn:         'Join the game →',
    statusPlaying:   'Playing',
    gpsAcquiring:    'Acquiring GPS…',
    gpsSent:         n => `Location sent (±${n}m)`,
    gpsError:        e => `GPS: ${e}`,
    gpsUnavail:      'GPS not available',
    emptyChat:       'No messages yet.\nWrite to the game master!',
    msgPlaceholder:  'Message to the game master…',
    masterLabel:     '🧭 Game Master',
    closedTitle:     'Game over!',
    closedText:      'Thank you for playing.\nThe game master has ended the session.',
    sendError:       'Send error — check your connection',
    legalLabel:      'Legal notice',
    resumeTitle:     'Session in progress',
    resumeInfo:      (team, sid) => `Team <strong>${team}</strong> — Session <strong>${sid}</strong>`,
    resumeBtn:       'Resume the game →',
    otherBtn:        'Join another game',
  }
};

// ════════════════════════════════════════
// ÉTAT
// ════════════════════════════════════════
const urlParams   = new URLSearchParams(window.location.search);
const URL_SESSION = urlParams.get('s') || 'demo';

let lang       = localStorage.getItem('jdp_lang') || null;
let T          = null;
let teamName   = '';
let sessionId  = URL_SESSION;
let geoWatchId = null;
let lastMsgIds = new Set();
let polling    = null;

// ════════════════════════════════════════
// FAB MENU
// ════════════════════════════════════════
document.addEventListener('click', e => {
  if (!document.getElementById('fab-menu').contains(e.target)) closeFab();
});
function toggleFab() { document.getElementById('fab-dropdown').classList.toggle('open'); }
function closeFab()  { document.getElementById('fab-dropdown').classList.remove('open'); }

function updateFabLang() {
  document.getElementById('fab-fr').classList.toggle('active', lang === 'fr');
  document.getElementById('fab-en').classList.toggle('active', lang === 'en');
}

function setLangFromMenu(l) {
  closeFab();
  const wasInGame = document.getElementById('game-screen').style.display === 'flex';
  setLang(l);
  // Si on est en jeu, ne pas quitter l'écran
  if (wasInGame) {
    document.getElementById('lang-screen').style.display  = 'none';
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('game-screen').style.display  = 'flex';
  }
}

function goLegal() {
  closeFab();
  // Ouvrir la page légale dans le même onglet (avec paramètre de session pour le retour)
  window.location.href = `legal.html?s=${encodeURIComponent(URL_SESSION)}&lang=${lang||'fr'}`;
}

// ════════════════════════════════════════
// LANGUE
// ════════════════════════════════════════
function setLang(l) {
  lang = l;
  localStorage.setItem('jdp_lang', l);
  T = I18N[l];
  applyTranslations();
  updateFabLang();
  // Afficher setup si on était sur l'écran de langue
  if (document.getElementById('lang-screen').style.display !== 'none') showSetup();
}

function applyTranslations() {
  if (!T) return;
  document.documentElement.lang = lang;
  document.title                  = T.appTitle;
  document.getElementById('txt-app-title').textContent   = T.appTitle;
  document.getElementById('txt-app-sub').textContent     = T.appSub;
  document.getElementById('txt-team-label').textContent  = T.teamLabel;
  document.getElementById('team-input').placeholder      = T.teamPlaceholder;
  document.getElementById('btn-join').textContent        = T.joinBtn;
  document.getElementById('session-label').textContent   = URL_SESSION;
  document.getElementById('txt-status-playing').textContent = T.statusPlaying;
  document.getElementById('msg-input').placeholder       = T.msgPlaceholder;
  document.getElementById('txt-empty-chat').innerHTML    = T.emptyChat.replace('\n','<br>');
  document.getElementById('txt-closed-title').textContent = T.closedTitle;
  document.getElementById('txt-closed-text').innerHTML   = T.closedText.replace('\n','<br>');
  document.getElementById('fab-legal-label').textContent = T.legalLabel;
  document.getElementById('txt-resume-title').textContent = T.resumeTitle;
  document.getElementById('btn-resume').textContent      = T.resumeBtn;
  document.getElementById('btn-other').textContent       = T.otherBtn;
  // gps status label si pas encore en jeu
  const gs = document.getElementById('gps-status');
  if (!gs.dataset.state) gs.textContent = T.gpsAcquiring;
}

// ════════════════════════════════════════
// MÉMOIRE DE SESSION (localStorage)
// ════════════════════════════════════════
function saveSession(team, sid) {
  localStorage.setItem('jdp_team', team);
  localStorage.setItem('jdp_session', sid);
}
function loadSavedSession() {
  return {
    team: localStorage.getItem('jdp_team'),
    sid:  localStorage.getItem('jdp_session'),
  };
}
function clearSavedSession() {
  localStorage.removeItem('jdp_team');
  localStorage.removeItem('jdp_session');
}

// ════════════════════════════════════════
// NAVIGATION ÉCRANS
// ════════════════════════════════════════
function showSetup() {
  document.getElementById('lang-screen').style.display   = 'none';
  document.getElementById('setup-screen').style.display  = 'flex';
  document.getElementById('game-screen').style.display   = 'none';
  document.getElementById('closed-screen').style.display = 'none';

  const saved = loadSavedSession();
  // Montrer la bannière seulement si la session sauvegardée correspond à l'URL actuelle
  const hasSaved = saved.team && saved.sid && saved.sid === URL_SESSION;
  document.getElementById('resume-banner').style.display = hasSaved ? 'block' : 'none';
  document.getElementById('setup-form').style.display    = hasSaved ? 'none'  : 'block';

  if (hasSaved && T) {
    document.getElementById('resume-info').innerHTML = T.resumeInfo(saved.team, saved.sid);
  }
}

function clearAndSetup() {
  clearSavedSession();
  document.getElementById('resume-banner').style.display = 'none';
  document.getElementById('setup-form').style.display    = 'block';
}

// ════════════════════════════════════════
// REJOINDRE / REPRENDRE
// ════════════════════════════════════════
async function resumeSession() {
  const saved = loadSavedSession();
  if (!saved.team) return;
  await startGame(saved.team, saved.sid);
}

async function joinGame() {
  const name = document.getElementById('team-input').value.trim();
  if (!name) return;
  await startGame(name, URL_SESSION);
}

async function startGame(name, sid) {
  // Vérifier si la session est fermée
  try {
    const open = await fbGet(`sessions/${sid}/open`);
    if (open === false) { clearSavedSession(); showClosed(); return; }
  } catch(e) { /* session pas encore créée = ok */ }

  teamName  = name;
  sessionId = sid;
  saveSession(teamName, sessionId);

  document.getElementById('header-team-name').textContent   = teamName;
  document.getElementById('header-session').textContent     = `Session ${sessionId}`;

  await fbSet(`sessions/${sessionId}/teams/${encodeTeam(teamName)}/name`,   teamName);
  await fbSet(`sessions/${sessionId}/teams/${encodeTeam(teamName)}/joined`, Date.now());

  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('game-screen').style.display  = 'flex';

  document.getElementById('gps-status').textContent = T.gpsAcquiring;
  startGPS();
  startPolling();
}

// Activation bouton join
document.getElementById('team-input').addEventListener('input', function() {
  document.getElementById('btn-join').disabled = this.value.trim().length < 2;
});
document.getElementById('team-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); if (!document.getElementById('btn-join').disabled) joinGame(); }
});
document.getElementById('btn-join').addEventListener('click', joinGame);

// ════════════════════════════════════════
// GPS
// ════════════════════════════════════════
function startGPS() {
  const gs = document.getElementById('gps-status');
  if (!navigator.geolocation) { gs.textContent = T.gpsUnavail; gs.className = 'gps-err'; return; }
  geoWatchId = navigator.geolocation.watchPosition(
    pos => {
      const { latitude:lat, longitude:lng, accuracy:acc } = pos.coords;
      gs.textContent   = T.gpsSent(Math.round(acc));
      gs.className     = 'gps-ok';
      gs.dataset.state = 'ok';
      fbSet(`sessions/${sessionId}/teams/${encodeTeam(teamName)}/position`,
            { lat, lng, acc:Math.round(acc), t:Date.now() });
    },
    err => { gs.textContent = T.gpsError(err.message); gs.className = 'gps-err'; },
    { enableHighAccuracy:true, maximumAge:5000, timeout:10000 }
  );
}

// ════════════════════════════════════════
// POLLING
// ════════════════════════════════════════
function startPolling() {
  if (polling) clearInterval(polling);
  pollMessages();
  polling = setInterval(pollMessages, 3000);
  setInterval(checkSession,  4000);
}

async function pollMessages() {
  try {
    // Vérification rapide de fermeture intégrée au poll principal
    const session = await fbGet(`sessions/${sessionId}`);
    if (session === null) { clearSavedSession(); showClosed(); return; }
    if (session && session.open === false) { clearSavedSession(); showClosed(); return; }
    const data = session ? session.messages : null;
    if (!data) return;
    const myKey = encodeTeam(teamName);
    const msgs = Object.entries(data)
      .map(([id,m]) => ({ id,...m }))
      .sort((a,b) => a.t - b.t)
      .filter(m => m.from === 'master'
        ? (m.to === myKey || m.to === null || m.to === undefined)
        : m.team === myKey);
    let hasNew = false;
    msgs.forEach(m => { if (!lastMsgIds.has(m.id)) hasNew = true; });
    if (hasNew) renderMessages(msgs);
  } catch(e) {}
}

async function checkSession() {
  try {
    // Vérifier d'abord le flag de fermeture dédié (survit à la suppression de la session)
    const closed = await fbGet(`closed/${sessionId}`);
    if (closed === true) { clearSavedSession(); showClosed(); return; }
  } catch(e) {}
  try {
    // Fallback : si le nœud session n'existe plus (null) ou open===false → terminée
    const data = await fbGet(`sessions/${sessionId}`);
    if (data === null) { clearSavedSession(); showClosed(); return; }
    if (data && data.open === false) { clearSavedSession(); showClosed(); }
  } catch(e) {}
}

// ════════════════════════════════════════
// RENDU MESSAGES
// ════════════════════════════════════════
function renderMessages(msgs) {
  document.getElementById('empty-chat').style.display = 'none';
  const area = document.getElementById('messages-area');
  msgs.forEach(m => {
    if (lastMsgIds.has(m.id)) return;
    lastMsgIds.add(m.id);
    const isMaster = m.from === 'master';
    const wrap   = document.createElement('div');
    wrap.className = isMaster ? 'msg-wrap-in' : 'msg-wrap-out';
    const bubble = document.createElement('div');
    bubble.className = `msg-bubble ${isMaster ? 'received' : 'sent'}`;
    bubble.dataset.id = m.id;
    bubble.innerHTML = (isMaster ? `<div class="msg-author">${T.masterLabel}</div>` : '')
      + escHtml(m.text)
      + `<span class="msg-time">${fmtTime(m.t)}</span>`;
    wrap.appendChild(bubble);
    area.appendChild(wrap);
  });
  area.scrollTop = area.scrollHeight;
}

// ════════════════════════════════════════
// ENVOI
// ════════════════════════════════════════
document.getElementById('btn-send').addEventListener('click', sendMessage);
document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text || !teamName) return;
  document.getElementById('btn-send').disabled = true;
  input.value = ''; input.style.height = 'auto';
  try {
    await fbPush(`sessions/${sessionId}/messages`,
      { from:'team', team:encodeTeam(teamName), teamName, text, t:Date.now() });
    await pollMessages();
  } catch(e) { showToast(T.sendError); }
  finally { document.getElementById('btn-send').disabled = false; }
}

// ════════════════════════════════════════
// FIN DE SESSION
// ════════════════════════════════════════
function showClosed() {
  if (geoWatchId) navigator.geolocation.clearWatch(geoWatchId);
  if (polling) clearInterval(polling);
  document.getElementById('game-screen').style.display   = 'none';
  document.getElementById('closed-screen').style.display = 'flex';
}

// ════════════════════════════════════════
// FIREBASE
// ════════════════════════════════════════
const FB = p => `${FIREBASE_URL}/${p}.json`;
async function fbGet(p)   { const r = await fetch(FB(p)); if (!r.ok) throw new Error(r.status); return r.json(); }
async function fbSet(p,v) { await fetch(FB(p), { method:'PUT',  body:JSON.stringify(v) }); }
async function fbPush(p,v){ await fetch(FB(p), { method:'POST', body:JSON.stringify(v) }); }

// ════════════════════════════════════════
// UTILITAIRES
// ════════════════════════════════════════
function encodeTeam(n) { return n.toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/_+/g,'_').slice(0,30); }
function escHtml(t)    { if(!t) return ''; return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function fmtTime(ts)   { return new Date(ts).toLocaleTimeString(lang==='en'?'en-GB':'fr-FR',{hour:'2-digit',minute:'2-digit'}); }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
if (lang) {
  T = I18N[lang];
  applyTranslations();
  updateFabLang();
  showSetup();
} else {
  document.getElementById('lang-screen').style.display = 'flex';
}
</script>
